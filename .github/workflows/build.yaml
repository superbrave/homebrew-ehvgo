name: Build EHVGo application

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  set-version-tags:
    name: Set version tags
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.prepare-version-tags.outputs.version }}
    steps:
      - name: Prepare image version and tags
        id: prepare-version-tags
        run: |
            VERSION=${GITHUB_REF#refs/tags/}
            VERSION=${VERSION//\//-}
            echo "version=${VERSION}" >> $GITHUB_OUTPUT

  build-application:
    name: Build EHVGo
    runs-on: ubuntu-latest
    needs:
      - set-version-tags
    strategy:
      fail-fast: true
      matrix:
        os: [linux, darwin]
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with: 
          go-version: 1.22
      - name: Cache Executables
        id: cache-execs
        uses: actions/cache@v4
        with:
            key: dist-${{ github.run_id }}-${{ matrix.os }}-${{ matrix.arch }}
            path: dist/ehvgo-${{ needs.set-version-tags.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}
      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          VERSION: ${{ needs.set-version-tags.outputs.version }}
        run: make -s build-cli

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: 
      - build-application
    strategy:
      fail-fast: true
      matrix:
        os: [linux, darwin]
        arch: [amd64, arm64]
    steps:
      - name: Load Executables
        uses: actions/cache@v4
        with:
            key: dist-${{ github.run_id }}-${{ matrix.os }}-${{ matrix.arch }}
            path: dist/ehvgo-${{ needs.set-version-tags.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          generate_release_notes: true
          make_latest: true
          files: |
            dist/ehvgo-*

